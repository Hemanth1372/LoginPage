<!DOCTYPE html>
<html>
    <head>
        <title>Login Page</title>
        <link rel="stylesheet" href="./style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>

        <div class="container">
            <!-- <div class="header">
                <a href="./reference.html"><p>Reference</p></a>
            </div> -->
            <div class="main-content">
                <div class="login">
                    <input type="email" placeholder="Email address" class="email" onKeyDown="handle(event)">
                    <input type="password" placeholder="Password" class="password" onKeyDown="handle(event)">
                    <button class="btn" type="submit" onclick="checkUser()" onkeyDown="Enter">Login</button>
                    <p class="status right-credentials wrong-credentials"></p>
                    <div class="options">
                        <a href="">Forgot Password</a>
                        <a href="./signup.html">New User</a>
                    </div>
                </div>
            </div>
        </div>
        <footer>
            <p>email: testuser@email.com</p>
            <p>pwd : testuser</p>
        </footer>
        <script src="./script.js"></script>
    </body>
</html>
